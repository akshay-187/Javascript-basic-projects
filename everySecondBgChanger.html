<!DOCTYPE html>
<html>
  <head>
    <title> Background Changer</title>

    <style>
      body{
        background-color: #212121;
        color:white;
      }
    </style>

  </head>
  <body>
    <h1 class="heading">Click on start to change Background Color every second</h1>
    <button class="start">Start</button>
    <button class="stop">stop</button>

    <script>
      
      const hexColor = function(){
        let hex = "#";
        const color = "0123456789ABCDEF"
        for(let i=0 ; i <6 ; i++){
          hex += color[Math.floor(Math.random()*16)];
        }
        return hex; 
      }
      let inter;
      function changeBg(){
        inter= setInterval(() => {
        document.querySelector("body").style.backgroundColor = hexColor()
        }, 1000);
      } 

      function stopBg(){
        clearInterval(inter);
      }


      document.querySelector(".start").addEventListener("click", changeBg );

      document.querySelector(".stop").addEventListener("click", stopBg);

    </script>

  </body>
</html>
